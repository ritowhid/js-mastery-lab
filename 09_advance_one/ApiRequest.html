<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub User Card</title>

    <style>
        body {
            background-color: #212121;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background-color: #2c2c2c;
            width: 300px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            display: none;
        }

        .card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background-color: #22c55e;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #16a34a;
        }

        .followers {
            margin-top: 10px;
            font-size: 18px;
            color: #38bdf8;
        }
    </style>
</head>

<body>

    <div>
        <button id="loadData">Load GitHub Data</button>

        <div class="card" id="card">
            <img id="avatar" src="" alt="Profile Photo">
            <h2 id="username"></h2>
            <p class="followers">Followers: <span id="followers"></span></p>
        </div>
    </div>

<script>
    const button = document.getElementById("loadData");
    const card = document.getElementById("card");

    button.addEventListener("click", function () {
        const requestUrl = 'https://api.github.com/users/hiteshchoudhary';
        const xhr = new XMLHttpRequest();

        xhr.open('GET', requestUrl);
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                const data = JSON.parse(this.responseText);

                document.getElementById("avatar").src = data.avatar_url;
                document.getElementById("username").innerText = data.login;
                document.getElementById("followers").innerText = data.followers;

                card.style.display = "block";
            }
        };
        xhr.send();
    });
</script>

</body>
</html>
