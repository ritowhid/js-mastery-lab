<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BMI Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="wrapper">
    <div class="card">

      <h1>BMI Calculator</h1>
      <p class="subtitle">Check your Body Mass Index</p>

      <form>
        <div class="input-group">
          <label for="height">Height (cm)</label>
          <input type="number" id="height" placeholder="e.g., 170" />
        </div>

        <div class="input-group">
          <label for="weight">Weight (kg)</label>
          <input type="number" id="weight" placeholder="e.g., 65" />
        </div>

        <button type="submit">Calculate</button>
      </form>

      <div class="result">
        <div id="results">--</div>
        <div id="message"></div>
      </div>

      <!-- ALWAYS VISIBLE GUIDE -->
      <div class="bmi-guide">
        <h3>BMI Classification</h3>
        <ul>
          <li><span class="low"></span> Low: less than 18.5</li>
          <li><span class="healthy"></span> Healthy: 18.5 – 24.9</li>
          <li><span class="high"></span> High: 25 – 29.9</li>
          <li><span class="very-high"></span> Very High: 30 or above</li>
        </ul>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
